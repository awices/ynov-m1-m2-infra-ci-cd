name: "Application Pipeline"

on:
  push:
  workflow_dispatch:
    inputs:
      target_sub_env:
        description: 'Environnement cible secondaire (ex: sandbox)'
        required: true
        default: 'sandbox'
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write
  security-events: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: "Clonage du depot"
        uses: actions/checkout@v5

      - name: "Configuration du Cache npm"
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: "Installation propre des dependances"
        run: |
          echo "::group::Installation des modules Node.js"
          npm ci
          echo "::endgroup::"

      - name: "Initialize CodeQL Analysis"
        uses: github/codeql-action/init@v4
        with:
          languages: 'javascript'

      - name: "Execution de la suite de tests"
        run: npm test

      - name: "Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@v4

      - name: "Publication du Rapport de Tests"
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/junit.xml'

  deploy-production:
    needs: build-and-test
    environment: production
    runs-on: ubuntu-latest
    
    steps:
      - name: "Clonage du depot"
        uses: actions/checkout@v5

      # Verrouillage par Commit SHA au lieu d'un tag mutable
      - name: "Installation de Mozilla SOPS via GitHub Action secrétisée"
        uses: mdgreenwald/mozilla-sops-action@v2.1.0
        with:
          version: 'v3.13.1' # Version du binaire SOPS à installer sur le runner

      - name: "Installation d'Age"
        run: sudo apt-get update && sudo apt-get install -y age

      - name: "Déchiffrement hermétique et Injection au Runtime"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }} 
        run: |
          # 1. Chargement de la clé privée de manière volatile en mémoire
          mkdir -p ~/.config/sops/age
          echo "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          export SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt
          
          # 2. Déchiffrement à la volée en variables d'environnement
          echo "Extraction sécurisée des configurations secrètes..."
          eval $(sops decrypt --output-type env secrets-prod.yaml)
          
          # 3. Nettoyage immédiat pour empêcher la persistance de la clé sur le disque du runner
          rm -rf ~/.config/sops/age/keys.txt
          
          # 4. Lancement simulé de l'application
          echo "Démarrage du backend Node.js en production..."
          # node app.js 
          
          echo "Deploiement effectue avec succes sur l'environnement officiel."
          echo "Sous-environnement selectionne manuellement : ${{ github.event.inputs.target_sub_env }}"